<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>過敏小百科 | 全方位抗敏生活指南</title>

    <meta
        name="description"
        content="提供過敏性鼻炎、塵蟎防護、空氣品質與抗敏生活的完整照護資訊。"
    />

    <meta
        name="keywords"
        content="過敏, 鼻炎, 塵蟎, AQI, 空氣品質"
    />

    <style>
        :root {
            --primary: #3a5a40;
            --primary-light: #edf2ee;
            --secondary: #4a5759;
            --bg-light: #fdfdfd;
            --card-bg: #ffffff;
            --text-dark: #2c3531;
            --text-muted: #6c757d;
            --accent-green: #2a9d8f;
            --accent-red: #e63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 100px;
        }

        body {
            font-family:
                "PingFang TC",
                "Noto Sans TC",
                "Microsoft JhengHei",
                sans-serif;

            background-color: #fafafa;
            color: var(--text-dark);
            line-height: 1.8;
        }

        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.02);

            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;

            border-bottom: 1px solid #f0f0f0;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 15px 20px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 24px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        nav a:hover {
            color: var(--primary);
        }

        .hero {
            text-align: center;
            padding: 120px 20px 40px;
            background:
                linear-gradient(
                    180deg,
                    #f4f6f4 0%,
                    #fafafa 100%
                );
        }

        .hero h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .hero p {
            color: var(--secondary);
            font-size: 1.05rem;
            max-width: 650px;
            margin: 0 auto;
        }

        .aqi-section {
            max-width: 920px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        .aqi-card {
            background: var(--card-bg);
            border: 1px solid #eef2f3;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            text-align: center;
        }

        .aqi-header {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .aqi-select-box {
            margin-bottom: 20px;
        }

        .aqi-select {
            padding: 8px 16px;
            font-size: 0.95rem;
            border-radius: 6px;
            border: 1px solid #ddd;
            color: var(--text-dark);
            background: #fff;
            cursor: pointer;
        }

        .aqi-display {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 30px;

            background: #fafafa;
            padding: 20px 40px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .aqi-num-box {
            text-align: center;
        }

        .aqi-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: #2a9d8f;
        }

        .aqi-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .aqi-status-box {
            text-align: left;
        }

        .aqi-status {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2a9d8f;
            margin-bottom: 4px;
        }

        .aqi-station {
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .aqi-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .risk-card {
            margin-top: 20px;
            padding: 18px;
            border-radius: 12px;
            background: #f7faf8;
            border: 1px solid #e5ece7;
            text-align: left;
        }

        .risk-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        #risk-content {
            color: var(--secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        main {
            max-width: 960px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        section {
            background: var(--card-bg);
            padding: 45px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.01);
        }

        h2 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 30px;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eaeaea;
            margin-left: 15px;
        }

        .intro-text {
            color: var(--secondary);
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 40px 0;
            background: #fff;
            border-top: 1px solid #eee;
        }

        @media (max-width: 800px) {

            nav ul {
                display: none;
            }

            section {
                padding: 25px 20px;
            }

            .aqi-display {
                padding: 20px;
                gap: 15px;
                width: 100%;
                flex-direction: column;
            }
        }

        @media (prefers-color-scheme: dark) {

            body {
                background: #111;
                color: #eee;
            }

            section,
            .aqi-card,
            footer {
                background: #1b1b1b;
                border-color: #333;
            }

            .aqi-display {
                background: #222;
            }

            .risk-card {
                background: #1d2421;
                border-color: #2f3b35;
            }

            nav a,
            .hero p,
            .intro-text,
            .aqi-station,
            .aqi-time,
            #risk-content {
                color: #ccc;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="nav-container">

        <a href="#" class="logo">
            🍃 過敏小百科
        </a>

        <nav>
            <ul>
                <li><a onclick="scrollToSection('當前空污')">即時空污</a></li>
                <li><a onclick="scrollToSection('百科')">過敏百科</a></li>
                <li><a onclick="scrollToSection('指南')">抗敏指南</a></li>
            </ul>
        </nav>

    </div>
</header>

<div class="hero">

    <h1>過敏小百科</h1>

    <p>
        提供過敏性鼻炎、塵蟎防護、空氣品質與抗敏生活的完整照護資訊。
    </p>

</div>

<div class="aqi-section" id="當前空污">

    <div class="aqi-card">

        <div class="aqi-header">
            😷 今日空氣品質指標 (AQI)
        </div>

        <div class="aqi-select-box">

            <label
                for="station-select"
                style="
                    font-size:0.9rem;
                    color:var(--secondary);
                "
            >
                選擇觀測測站：
            </label>

            <select
                id="station-select"
                class="aqi-select"
                onchange="changeStation()"
            >
                <option>
                    測站資料載入中...
                </option>
            </select>

        </div>

        <div class="aqi-display">

            <div class="aqi-num-box">

                <div
                    id="aqi-value"
                    class="aqi-value"
                >
                    --
                </div>

                <div class="aqi-label">
                    AQI 指數
                </div>

            </div>

            <div class="aqi-status-box">

                <div
                    id="aqi-status"
                    class="aqi-status"
                >
                    連線中...
                </div>

                <div
                    id="aqi-station-name"
                    class="aqi-station"
                >
                    觀測站：--
                </div>

                <div
                    id="aqi-time"
                    class="aqi-time"
                >
                    更新時間：--
                </div>

            </div>

        </div>

        <div
            id="allergy-risk-card"
            class="risk-card"
        >

            <div class="risk-title">
                🌿 今日過敏風險建議
            </div>

            <div id="risk-content">
                資料分析中...
            </div>

        </div>

    </div>

</div>

<main>

    <section id="百科">

        <h2>
            過敏小百科
        </h2>

        <div class="intro-text">

            過敏性鼻炎常見原因包括：

            <br /><br />

            • 塵蟎
            <br />
            • 花粉
            <br />
            • 黴菌
            <br />
            • 寵物皮屑
            <br />
            • 空氣污染

        </div>

    </section>

    <section id="指南">

        <h2>
            抗敏生活指南
        </h2>

        <div class="intro-text">

            ✓ 每週清洗寢具
            <br />

            ✓ 使用防蟎寢具
            <br />

            ✓ 維持濕度 40~50%
            <br />

            ✓ 定期清洗冷氣濾網
            <br />

            ✓ 空污時配戴口罩

        </div>

    </section>

</main>

<footer>

    <p>
        © 2026 過敏小百科
    </p>

    <br />

    <p>
        資料來源：
        環境部、國民健康署、台灣氣喘衛教學會
    </p>

</footer>

<script>

    function scrollToSection(id) {

        const element =
            document.getElementById(id);

        if (element) {

            element.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });

        }
    }

    // ===== AQI =====

    let globalAqiData = [];

    // 你的 Cloudflare Worker 網址
    const apiUrl =
        'https://YOUR-WORKER.workers.dev';

    async function fetchAQIData() {

        try {

            const response =
                await fetch(apiUrl);

            if (!response.ok) {
                throw new Error('API error');
            }

            const resData =
                await response.json();

            if (
                resData &&
                resData.records
            ) {

                globalAqiData =
                    resData.records;

                initStationSelect();

            }

        } catch (error) {

            console.error(error);

            document.getElementById(
                'aqi-status'
            ).innerText =
                'AQI 載入失敗';

        }

    }

    function initStationSelect() {

        const selectEl =
            document.getElementById(
                'station-select'
            );

        selectEl.innerHTML = '';

        globalAqiData.forEach(
            (record, index) => {

                const option =
                    document.createElement(
                        'option'
                    );

                option.value = index;

                option.text =
                    `[${record.county}] ${record.sitename}`;

                selectEl.appendChild(option);

            }
        );

        const defaultIndex =
            globalAqiData.findIndex(
                item =>
                    item.county.includes(
                        '彰化'
                    )
            );

        renderAQI(
            defaultIndex !== -1
                ? defaultIndex
                : 0
        );

    }

    function changeStation() {

        const index =
            document.getElementById(
                'station-select'
            ).value;

        renderAQI(index);

    }

    function renderAQI(index) {

        const data =
            globalAqiData[index];

        if (!data) return;

        const aqiValue =
            parseInt(data.aqi) || 0;

        const valueEl =
            document.getElementById(
                'aqi-value'
            );

        const statusEl =
            document.getElementById(
                'aqi-status'
            );

        valueEl.innerText =
            data.aqi || '無資料';

        document.getElementById(
            'aqi-station-name'
        ).innerText =
            `觀測站：${data.county} - ${data.sitename}`;

        document.getElementById(
            'aqi-time'
        ).innerText =
            `更新時間：${data.publishtime}`;

        if (aqiValue <= 50) {

            statusEl.innerText =
                '🟢 空氣良好';

            valueEl.style.color =
                '#2a9d8f';

            statusEl.style.color =
                '#2a9d8f';

        } else if (aqiValue <= 100) {

            statusEl.innerText =
                '🟡 空氣普通';

            valueEl.style.color =
                '#e9c46a';

            statusEl.style.color =
                '#b79535';

        } else if (aqiValue <= 150) {

            statusEl.innerText =
                '🟠 敏感族群不健康';

            valueEl.style.color =
                '#f4a261';

            statusEl.style.color =
                '#e76f51';

        } else {

            statusEl.innerText =
                '🔴 空氣不健康';

            valueEl.style.color =
                '#e63946';

            statusEl.style.color =
                '#e63946';
        }

        renderRiskSuggestion(aqiValue);

    }

    function renderRiskSuggestion(aqi) {

        const riskEl =
            document.getElementById(
                'risk-content'
            );

        let html = '';

        if (aqi <= 50) {

            html = `
                ✅ 空氣品質良好<br>
                ✓ 適合一般戶外活動<br>
                ✓ 可正常開窗通風
            `;

        } else if (aqi <= 100) {

            html = `
                😷 敏感族群需留意<br>
                ✓ 建議配戴口罩<br>
                ✓ 回家後洗臉清鼻腔
            `;

        } else if (aqi <= 150) {

            html = `
                ⚠️ 過敏風險升高<br>
                ✓ 減少長時間戶外活動<br>
                ✓ 開啟空氣清淨機
            `;

        } else {

            html = `
                🚨 空氣品質不健康<br>
                ✓ 建議減少外出<br>
                ✓ 關閉窗戶<br>
                ✓ 持續配戴口罩
            `;
        }

        riskEl.innerHTML = html;

    }

    fetchAQIData();

</script>

</body>
</html>
